version = 0.1

[default.deploy.parameters]
stack_name = "sam-app"
resolve_s3 = true
s3_prefix = "sam-app"
region = "eu-west-2"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
disable_rollback = true
parameter_overrides = "CognitoUserPoolName=\"fitness-app-user-pool\" CognitoUserPoolClientName=\"fitness-app-client-user-pool\""
image_repositories = []

[default.global.parameters]
region = "eu-west-2"
